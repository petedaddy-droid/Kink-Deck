<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREAK OR DRINK XXX - 3 Players</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Playfair+Display:wght@700&display=swap');
        body {
            margin: 0; padding: 0; background: linear-gradient(#1a0000, #330000); color: #fff; font-family: system-ui; text-align: center; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header {
            background: #800000; padding: 15px; font-size: 1.4em; font-weight: bold; text-shadow: 0 0 10px #ff00ff;
        }
        .players {
            display: flex; justify-content: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.5);
        }
        .player {
            background: #4B0082; padding: 8px 16px; border-radius: 20px; font-weight: bold;
        }
        #deck {
            flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1000px;
        }
        .card {
            width: 320px; height: 420px; background: linear-gradient(135deg, #4B0082, #8B008B); border-radius: 15px; box-shadow: 0 10px 30px rgba(255,0,255,0.5); cursor: pointer; transition: transform 0.6s; transform-style: preserve-3d; position: relative;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-inner { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; border-radius: 15px; }
        .card-front { background: linear-gradient(135deg, #4B0082, #8B008B); }
        .card-back {
            background: linear-gradient(135deg, #8B0000, #FF1493); transform: rotateY(180deg); font-size: 1.3em; line-height: 1.3;
        }
        .devil { font-size: 60px; }
        button, .card, div[onclick] {
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        button {
            margin: 8px; padding: 12px 24px; font-size: 1.1em; background: #ff00ff; color: white; border: none; border-radius: 50px;
        }
        button:hover, button:active { background: #ff66ff; }
        #timer { font-size: 2em; color: #ffd700; margin: 10px; }
        .log { max-height: 160px; overflow-y: auto; background: rgba(0,0,0,0.6); margin: 10px; padding: 10px; text-align: left; border-radius: 10px; font-size: 0.95em; }
    </style>
</head>
<body>
    <header>FREAK OR DRINK <span style="color:#ff00ff;">XXX • 3 Players</span></header>
    
    <div class="players" id="playerDisplay"></div>

    <div id="deck">
        <div class="card" id="mainCard">
            <div class="card-inner card-front">
                <div class="devil">😈</div>
                <h2>FREAK OR DRINK?</h2>
                <p style="font-size:1.2em;">3-Player Mode</p>
                <p>Tap card to flip • Button to draw</p>
            </div>
            <div class="card-inner card-back" id="dareText"></div>
        </div>
    </div>

    <div>
        <button onclick="drawCard()">DRAW NEW CARD</button>
        <button onclick="startTimer()">START 60s TIMER</button>
        <div id="timer">60</div>
    </div>

    <div class="log" id="actionLog"></div>

    <script>
        let players = ["Pete", "Summer", "Third"];
        function setupPlayers() {
            const input = prompt("Enter 3 names (comma separated):", players.join(","));
            if (input) players = input.split(",").map(n => n.trim()).slice(0,3);
            if (players.length < 3) players = players.concat(["Player 3", "Player 4"]).slice(0,3);
            renderPlayers();
        }
        function renderPlayers() {
            document.getElementById('playerDisplay').innerHTML = players.map((p,i) => 
                `<div class="player" style="background: hsl(${i*120},70%,40%)">${p}</div>`
            ).join('');
        }

        const dares = [ /* same big list as before - abbreviated here for space */ 
            "The group chooses one person to give a lap dance to another for 60 seconds.",
            "Choose one player to receive oral for 45 seconds while the others watch.",
            "Everyone removes one item of clothing. Last one to finish drinks.",
            // ... (I can send the full list if needed)
            "Double team oral on one player for 60 seconds."
        ];

        let currentDare = "";
        function getRandomPlayer() {
            return players[Math.floor(Math.random() * players.length)];
        }

        function drawCard() {
            const card = document.getElementById('mainCard');
            card.classList.remove('flipped');
            setTimeout(() => {
                let dare = dares[Math.floor(Math.random() * dares.length)];
                dare = dare.replace(/Player [XY]/g, getRandomPlayer());
                currentDare = dare;
                document.getElementById('dareText').innerHTML = `<strong>${currentDare}</strong><br><br><small>😈 FREAK or DRINK? 😈</small>`;
                card.classList.add('flipped');
                addLog(`Drew: ${dare}`);
            }, 300);
        }

        function flipCard() {
            document.getElementById('mainCard').classList.toggle('flipped');
        }

        let timeLeft = 60;
        let timerInterval;
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            document.getElementById('timer').textContent = timeLeft;
            timerInterval = setInterval(() => {
                if (--timeLeft <= 0) clearInterval(timerInterval);
                document.getElementById('timer').textContent = timeLeft;
            }, 1000);
        }

        function addLog(txt) {
            const log = document.getElementById('actionLog');
            const entry = document.createElement('div');
            entry.textContent = `${new Date().toLocaleTimeString().slice(0,-3)}: ${txt}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // Make card tappable
        document.getElementById('mainCard').addEventListener('click', flipCard);

        // Init
        window.onload = () => {
            setupPlayers();
            drawCard(); // initial card
        };
    </script>
</body>
</html>
